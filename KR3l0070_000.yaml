body:
  text: 北忩炙輠錄小説家𩔖一雜事之屬提要臣等謹案北窓炙輠錄一卷宋施徳操撰徳操有孟子發題已著錄是書炙輠之名葢取義淳于髠事然所記多當時前輩盛徳可為士大夫觀法者實不以滑稽嘲弄為主未審何以命此名也徳操與張九成友善故孟子發題附刻於横浦集末其學問則九成純耽禪悦徳操多稱道二程雖間一及蘇氏而不甚鄭重其第一條即言王氏新法由於激成以闡明程子之意則宗洛而不宗蜀其微意固可概見惟林靈素妖妄蠱惑實方士中桀黠之雄而徳操稱其有活人之心未免好為異論又解孟子萬物皆備一條尤近荀卿性惡之㫖其横浦之學偶相漸染故立是異説歟瑕瑜不掩分别觀之可也徳操病廢終身行事無可表見志乗至不載其姓名其書明以來𫝊本亦希朱彛尊始得是本於海鹽乃稍稍𫝊抄流播殘編蠧蝕幾佚幸存亦可云希靚之秘笈矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:7a719129a2201bb04b97b685d8ff089855e4c425d52b78c4ac5019cd9c2cac2d
