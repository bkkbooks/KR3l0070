body:
  text: 北忩炙輠録小說家類一雜事之屬提要臣等謹案北窗炙輠録一卷宋施德操撰德操有孟子發題已著録是書炙輠之名蓋取義淳于髠事然所記多當時前輩盛德可為士大夫觀法者實不以滑稽嘲弄為主未審何以命此名也德操與張九成友善故孟子發題附刻於橫浦集末其學問則九成純耽禪悅德操多稱道二程雖間一及蘇氏而不甚鄭重其第一條即言王氏新法由於激成以闡明程子之意則宗洛而不宗蜀其微意固可概見惟林靈素妖妄蠱惑實方士中桀黠之雄而德操稱其有活人之心未免好為異論又解孟子萬物皆備一條尤近荀卿性惡之㫖其橫浦之學偶相漸染故立是異說歟瑕瑜不掩分别觀之可也德操病廢終身行事無可表見志乘至不載其姓名其書明以來𫝊本亦希朱彛尊始得是本於海鹽乃稍稍𫝊抄流播殘編蠧蝕幾佚幸存亦可云希靚之祕笈矣乾隆四十一年十月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:a4196bab50d4262a1dd81f8da958d50e341307b1e252c0dbe12d3f37b297de49
